name: build-release

# Push to main           -> build both DLLs + run native tests (no release).
# Push a tag like v1.2.3 -> same, then publish a GitHub Release with the DLLs.
# Manual run (Actions UI) -> build + tests on demand.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# action-gh-release needs write access to create the release.
permissions:
  contents: write

# Don't pile up runs on rapid pushes to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pinned 32-bit toolchain (the i386-win32 FPC that builds the 32-bit DLL).
# The 64-bit FPC comes from setup-lazarus. Each compiler builds its own native
# target -- no cross-compilers, because neither distribution ships the other's.
# Bump both together (folder name + filename) to move FPC/Lazarus forward.
env:
  LAZ_VERSION: "3.2"
  FPC_VERSION: "3.2.2"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # gen_charmap.py runs in verify mode here (no app/unwrap.py in this repo),
      # so Python only validates the committed includes.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Provides the x86_64-win64 FPC (ppcx64) used for the 64-bit DLL and tests.
      - name: Set up Lazarus + FPC (x86_64)
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: stable

      # Provides the i386-win32 FPC (ppc386) used for the 32-bit DLL. Installed
      # to its own dir and exposed via FPC_I386_BIN; NOT put on the global PATH,
      # so it doesn't shadow the x86_64 compiler used by the steps above/below.
      - name: Install FPC i386-win32 (for the 32-bit DLL)
        shell: pwsh
        run: |
          $file = "lazarus-$env:LAZ_VERSION-fpc-$env:FPC_VERSION-win32.exe"
          $path = "project/lazarus/Lazarus%20Windows%2032%20bits/Lazarus%20$env:LAZ_VERSION/$file"
          # downloads.sourceforge.net is behind a Cloudflare challenge for scripted
          # clients; the master.dl mirror serves the binary directly. ${path} braces
          # are required so '?' starts the query rather than extending the var name.
          # The size check rejects any mirror that answers with an HTML stub.
          $mirrors = @(
            "https://master.dl.sourceforge.net/${path}?viasf=1",
            "https://phoenixnap.dl.sourceforge.net/${path}?viasf=1",
            "https://gigenet.dl.sourceforge.net/${path}?viasf=1"
          )
          $exe = Join-Path $env:RUNNER_TEMP "lazarus-setup.exe"
          $ok = $false
          foreach ($url in $mirrors) {
            try {
              Write-Host "Trying $url"
              Invoke-WebRequest -Uri $url -OutFile $exe -MaximumRedirection 10 -UseBasicParsing -UserAgent 'Mozilla/5.0'
              $len = (Get-Item $exe).Length
              if ($len -gt 100MB) { Write-Host "  OK ($len bytes)"; $ok = $true; break }
              Write-Host "  too small ($len bytes)"
            } catch { Write-Host "  failed: $($_.Exception.Message)" }
          }
          if (-not $ok) { throw "Failed to download Lazarus installer from any SourceForge mirror." }
          # Silent InnoSetup install; this also writes a working fpc.cfg.
          Start-Process -FilePath $exe -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/DIR=C:\Lazarus32' -Wait
          $fpcBin = "C:\Lazarus32\fpc\$env:FPC_VERSION\bin\i386-win32"
          if (-not (Test-Path (Join-Path $fpcBin 'ppc386.exe'))) { throw "ppc386.exe not found in $fpcBin after install." }
          "FPC_I386_BIN=$fpcBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Show toolchains
        shell: cmd
        run: |
          echo == x86_64 ==
          fpc -iV
          echo == i386 ==
          "%FPC_I386_BIN%\fpc.exe" -iV

      # Gate: TestUnwrap.exe sets ExitCode=1 on any failure -> step fails.
      - name: Run native tests (x86_64)
        shell: cmd
        run: tests\runtests.bat

      - name: Build 64-bit DLL
        shell: cmd
        run: build\build64.bat

      - name: Build 32-bit DLL
        shell: cmd
        run: |
          set "PATH=%FPC_I386_BIN%;%PATH%"
          call build\build32.bat
          if errorlevel 1 exit /b 1

      # Always keep the binaries downloadable from the run.
      - name: Upload DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PLSQLUnwrap-dll
          path: |
            dist/PLSQLUnwrap64.dll
            dist/PLSQLUnwrap32.dll
          if-no-files-found: error

      # Only on a v* tag: attach the DLLs to a Release for that version.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PLSQLUnwrap64.dll
            dist/PLSQLUnwrap32.dll
          generate_release_notes: true
          fail_on_unmatched_files: true
